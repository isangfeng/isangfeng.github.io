    .social-links {

    .social-links a {

    .theme-toggle {

        z-index: 1;
    }

    .theme-toggle-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 3.2rem;
        min-width: 3.2rem;
        min-height: 1.7rem;
        padding: 0 0.3rem;
        border: 1px solid currentColor;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.95);
        color: #111;
        cursor: pointer;
        transition:
            background-color 0.18s ease,
            color 0.18s ease;
        position: relative;
        visibility: visible !important;
        opacity: 1 !important;
        pointer-events: auto !important;
        box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.08);
    }

    .theme-toggle-btn:hover {
        background: rgba(0, 0, 0, 0.08);
        color: #111;
    }

    .theme-toggle-btn:focus-visible {
        outline: 2px solid rgba(0, 0, 0, 0.2);
        outline-offset: 2px;
    }

    .theme-toggle-btn svg {
        display: block;
        width: 1rem;
        height: 1rem;
        fill: currentColor;
        transition: opacity 0.3s ease;
    }

    .theme-toggle-btn .sun-icon {
        opacity: 1;
        position: relative;
    }

    .theme-toggle-btn .moon-icon {
        opacity: 0;
        position: relative;
    }

    html.dark .theme-toggle-btn .sun-icon {
        opacity: 0;
    }

    html.dark .theme-toggle-btn .moon-icon {
        opacity: 1;
    }

    html.dark .theme-toggle-btn {
        background: #121212;
        color: #e0e0e0;
    }

    html.dark .theme-toggle-btn:hover {
        background: #e0e0e0;
        color: #121212;
    }

    @media (prefers-color-scheme: dark) {
        html:not(.light) .theme-toggle-btn {
            background: #121212;
            color: #e0e0e0;
        }

        html:not(.light) .theme-toggle-btn:hover {
            background: #e0e0e0;
            color: #121212;
        }
    }

    @media (max-width: 760px) {
        .theme-toggle {
            justify-content: center;
        }
    }

    #menu-label,
    .masthead .menu a {
        cursor: pointer;
    }
</style>
<link rel="stylesheet" href="/css/custom.css" />
<script>
    (function () {
        const root = document.documentElement;
        const savedTheme = localStorage.getItem("theme");
        if (savedTheme === "dark" || savedTheme === "light") {
            root.classList.remove("dark", "light");
            root.classList.add(savedTheme);
        }

        document.addEventListener("DOMContentLoaded", function () {
            const themeToggle = document.getElementById("theme-toggle");
            if (themeToggle) {
                themeToggle.addEventListener("click", function () {
                    if (root.classList.contains("dark")) {
                        root.classList.remove("dark");
                        root.classList.add("light");
                        localStorage.setItem("theme", "light");
                    } else {
                        root.classList.remove("light");
                        root.classList.add("dark");
                        localStorage.setItem("theme", "dark");
                    }
                });
            }

            
            const backToTopBtn = document.createElement('button');
            backToTopBtn.id = 'back-to-top';
            backToTopBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M7 14l5-5 5 5z"/></svg>';
            backToTopBtn.setAttribute('aria-label', 'Back to top');
            document.body.appendChild(backToTopBtn);

            function updateBackToTopButton() {
                if (window.scrollY > 300) {
                    backToTopBtn.style.display = 'flex';
                } else {
                    backToTopBtn.style.display = 'none';
                }
            }

            window.addEventListener('scroll', updateBackToTopButton);
            updateBackToTopButton();

            backToTopBtn.addEventListener('click', function () {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });

            
            const codeBlocks = document.querySelectorAll('.highlight');
            codeBlocks.forEach(function (codeBlock) {
                if (codeBlock.querySelector('.copy-button')) {
                    return;
                }

                const copyButton = document.createElement('button');
                copyButton.className = 'copy-button';
                copyButton.textContent = 'Copy';
                copyButton.setAttribute('type', 'button');
                codeBlock.appendChild(copyButton);

                copyButton.addEventListener('click', function () {
                    const codeElement = codeBlock.querySelector('code');
                    const codeText = codeElement ? codeElement.innerText : codeBlock.innerText.replace(/\b(Copy|Copied!)\b/g, '').trim();
                    navigator.clipboard.writeText(codeText).then(function () {
                        copyButton.classList.add('copied');
                        copyButton.textContent = 'Copied!';
                        setTimeout(function () {
                            copyButton.textContent = 'Copy';
                            copyButton.classList.remove('copied');
                        }, 2000);
                    });
                });
            });
        });
    })();
</script>
