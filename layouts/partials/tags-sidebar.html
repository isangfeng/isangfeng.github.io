{{ $tags := site.Taxonomies.tags }}
{{ $tagsPage := site.GetPage "/tags" }}
{{ if gt (len $tags) 0 }}
  <aside class="order-first px-0 lg:order-last lg:ms-auto lg:max-w-2xs lg:ps-8">
    <nav class="toc ps-5 print:hidden lg:sticky {{ .topClass }}" aria-label="{{ $tagsPage.Title }}">
      <div class="min-w-[220px] border-s-1 border-dotted py-2 -ms-5 ps-5 dark:border-neutral-600">
        <h2 class="mt-0 mb-2 text-lg font-semibold text-neutral-800 dark:text-neutral-100">
          <a class="hover:underline hover:underline-offset-2" href="{{ $tagsPage.RelPermalink }}">
            {{ $tagsPage.Title }}
          </a>
        </h2>
        <ul class="m-0 list-none ps-0">
          {{ range $tags.Alphabetical }}
            <li class="my-1">
              <a class="text-neutral-700 hover:text-primary-600 dark:text-neutral-300 dark:hover:text-primary-400" href="{{ .Page.RelPermalink }}">
                {{ .Page.Title }}
              </a>
              <span class="ms-1 text-sm text-neutral-400">{{ .Count }}</span>
            </li>
          {{ end }}
        </ul>
      </div>
    </nav>
  </aside>
{{ end }}
