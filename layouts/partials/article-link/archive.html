<article class="flex items-center gap-4 py-1">
  <time class="shrink-0 text-sm tabular-nums text-neutral-500 dark:text-neutral-400" datetime="{{ .Date.Format "2006-01-02" }}">
    {{ .Date.Format "01-02" }}
  </time>
  <h3 class="min-w-0">
    <a
      {{ with .Params.externalUrl }}
        href="{{ . }}" target="_blank" rel="external"
      {{ else }}
        href="{{ .RelPermalink }}"
      {{ end }}
      class="text-neutral-800 decoration-primary-500 hover:underline hover:underline-offset-2 dark:text-neutral">
      {{ .Title | emojify }}
      {{ if .Params.externalUrl }}
        <span class="cursor-default align-top text-xs text-neutral-400 dark:text-neutral-500">
          <span class="rtl:hidden">&#8599;</span>
          <span class="ltr:hidden">&#8598;</span>
        </span>
      {{ end }}
    </a>
  </h3>
</article>
