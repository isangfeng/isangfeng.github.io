<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <style>
    .bg   { fill: #ffffff; }
    .ring { fill: none; stroke: #111111; stroke-width: 3; }
    .ch   { fill: #111111; }
    @media (prefers-color-scheme: dark) {
      .bg   { fill: #111111; }
      .ring { stroke: #e0e0e0; }
      .ch   { fill: #e0e0e0; }
    }
  </style>
  <!-- Background -->
  <rect class="bg" width="64" height="64" rx="13"/>
  <!-- Border -->
  <rect class="ring" x="3" y="3" width="58" height="58" rx="10"/>
  <!-- 桑 character -->
  <text class="ch"
        x="32" y="48"
        font-size="38"
        font-family="'PingFang SC','Hiragino Sans GB','Noto Serif SC','Microsoft YaHei',serif"
        text-anchor="middle"
        dominant-baseline="auto">桑</text>
</svg>
