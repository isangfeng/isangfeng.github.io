colorScheme = "blowfish"
defaultAppearance = "light"
autoSwitchAppearance = true

enableSearch = true
enableCodeCopy = true

mainSections = ["posts"]
defaultBackgroundImage = "img/home-background.jpg"

[header]
  layout = "fixed"

[footer]
  showMenu = true
  showCopyright = true
  showThemeAttribution = true
  showAppearanceSwitcher = true
  showScrollToTop = true

[homepage]
  layout = "background"
  homepageImage = "img/home-background.jpg"
  layoutBackgroundBlur = false
  showRecent = true
  showRecentItems = 5
  showMoreLink = true
  showMoreLinkDest = "posts"
  cardView = true

[article]
  showDate = true
  showAuthor = false
  showHero = true
  heroStyle = "background"
  layoutBackgroundBlur = false
  layoutBackgroundHeaderSpace = false
  showBreadcrumbs = false
  showDraftLabel = false
  showEdit = false
  showPagination = true
  showReadingTime = true
  showTableOfContents = true
  showTaxonomies = true
  showWordCount = false
  sharingLinks = []
  showComments = true

[list]
  showHero = true
  heroStyle = "background"
  layoutBackgroundBlur = false
  layoutBackgroundHeaderSpace = false
  showBreadcrumbs = false
  showSummary = true
  showTableOfContents = false
  showCards = true
  groupByYear = true
  cardView = false

[taxonomy]
  showHero = true
  heroStyle = "background"
  layoutBackgroundBlur = false
  layoutBackgroundHeaderSpace = false

[term]
  showHero = true
  heroStyle = "background"
  layoutBackgroundBlur = false
  layoutBackgroundHeaderSpace = false
