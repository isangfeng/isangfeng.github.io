# ==========================================
# 1. 全局基础配置
# ==========================================
baseURL = 'https://isangfeng.github.io/'
title = 'Feng Sang | 桑峰'
theme = 'Ivy'

# 语言核心设置
defaultContentLanguage = "zh"          # 建议将中文设为默认，更符合你的主要受众
defaultContentLanguageInSubdir = true  # 开启后 URL 结构为 /zh/ 和 /en/

publishDir = "docs"

[params]
    footer = "&copy; Feng Sang 2024-{Year}"
    [params.social]
        github = "https://github.com/isangfeng"
        email = "sangfengchn@outlook.com"
        bilibili = "https://space.bilibili.com/357395902"

# ==========================================
# HTML 和 Markdown 配置
# ==========================================
[markup.goldmark.parser]
autoHeadingID = true
wrapStandAloneImageWithinParagraph = true

[markup.goldmark.parser.attribute]
block = true
title = true

[markup.goldmark.renderer]
unsafe = true  # 允许使用 HTML 标签

# ==========================================
# 2. 中文版配置 (Chinese)
# ==========================================
[languages.zh]
    languageName = "中文"
    contentDir = "content/zh/"
    weight = 1

    # 中文版菜单
    [[languages.zh.menu.main]]
            name = "首页"
            url = "/zh/"      # 绝对路径
            weight = 1

    [[languages.zh.menu.main]]
            name = "日志"
            url = "/zh/posts/"
            weight = 2

    [[languages.zh.menu.main]]
            name = "光影"
            url = "/zh/photos/"
            weight = 3

    [[languages.zh.menu.main]]
        name = "分类"
        url = "/zh/categories/"
        weight = 4

    [[languages.zh.menu.main]]
        name = "标签"
        url = "/zh/tags/"
        weight = 5

    [[languages.zh.menu.main]]
        name = "EN"   # 切换按钮
        url = "/en/"        # 绝对路径跳转到英文站
        weight = 10

# ==========================================
# 3. 英文版配置 (English)
# ==========================================
[languages.en]
    languageName = "Homepage"
    contentDir = "content/en/"
    weight = 1

    [[languages.en.menu.main]]
        name = "Homepage"
        url = "/en/"      # 绝对路径
        weight = 1
    
    [[languages.en.menu.main]]
        name = "Blogs"
        url = "/en/posts/"   # 绝对路径
        weight = 2

    [[languages.en.menu.main]]
        name = "Categories"
        url = "/en/categories/"
        weight = 3

    [[languages.en.menu.main]]
        name = "Tags"
        url = "/en/tags/"
        weight = 4

    [[languages.en.menu.main]]
        name = "中文"      # 切换按钮
        url = "/zh/"        # 绝对路径跳转到中文站
        weight = 10
