<style>
    .social-links {
        display: flex;
        justify-content: flex-end;
        gap: 0.9rem;
        margin-top: 1.2rem;
    }

    .social-links a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 2.2rem;
        height: 2.2rem;
        border: 1px solid currentColor;
        border-radius: 999px;
        padding: 0;
        transition:
            background-color 0.18s ease,
            color 0.18s ease;
    }

    .social-links a:hover:not(.hover-disabled) {
        background: #111;
        color: #fff;
    }

    .social-links svg {
        width: 1.1rem;
        height: 1.1rem;
        fill: currentColor;
    }

    @media (max-width: 760px) {
        .social-links {
            justify-content: center;
        }
    }

    .theme-toggle {
        display: flex;
        justify-content: flex-end;
        width: 100%;
        margin-top: 1rem;
        z-index: 1;
    }

    .theme-toggle-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 3.2rem;
        min-width: 3.2rem;
        min-height: 1.7rem;
        padding: 0 0.3rem;
        border: 1px solid currentColor;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.95);
        color: #111;
        cursor: pointer;
        transition:
            background-color 0.18s ease,
            color 0.18s ease;
        position: relative;
        visibility: visible !important;
        opacity: 1 !important;
        pointer-events: auto !important;
        box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.08);
    }

    @media (hover: hover) {
        .theme-toggle-btn:hover {
            background: rgba(0, 0, 0, 0.08);
            color: #111;
        }
    }

    .theme-toggle-btn:focus-visible {
        outline: 2px solid rgba(0, 0, 0, 0.2);
        outline-offset: 2px;
    }

    .theme-toggle-btn:active {
        background: rgba(255, 255, 255, 0.95) !important;
        color: #111 !important;
    }

    html.dark .theme-toggle-btn:active {
        background: #121212 !important;
        color: #e0e0e0 !important;
    }

    html.light .theme-toggle-btn svg {
        display: block;
        width: 1rem;
        height: 1rem;
        fill: currentColor;
        transition: opacity 0.3s ease;
    }

    .theme-toggle-btn .sun-icon {
        opacity: 1;
        position: relative;
    }

    .theme-toggle-btn .moon-icon {
        opacity: 0;
        position: relative;
    }

    html.dark .theme-toggle-btn .sun-icon {
        opacity: 0;
    }

    html.dark .theme-toggle-btn .moon-icon {
        opacity: 1;
        fill: #ffffff;
    }

    html.dark .theme-toggle-btn {
        background: transparent;
        border-color: #ffffff;
        color: #ffffff;
    }

    @media (hover: hover) {
        html.dark .theme-toggle-btn:hover {
            background: #ffffff;
            color: #121212;
            border-color: #121212;
        }

        html.dark .theme-toggle-btn:hover .moon-icon {
            fill: #121212;
        }
    }

    @media (prefers-color-scheme: dark) {
        html:not(.light) .theme-toggle-btn {
            background: transparent;
            border-color: #ffffff;
            color: #ffffff;
        }

        html:not(.light) .theme-toggle-btn .moon-icon {
            fill: #ffffff;
        }
    }

    @media (prefers-color-scheme: dark) and (hover: hover) {
        html:not(.light) .theme-toggle-btn:hover {
            background: #ffffff;
            color: #121212;
            border-color: #121212;
        }

        html:not(.light) .theme-toggle-btn:hover .moon-icon {
            fill: #121212;
        }
    }

    @media (max-width: 760px) {
        .theme-toggle {
            justify-content: center;
        }
    }

    #ambient-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100% !important;
        height: 100% !important;
        pointer-events: none;
        z-index: 0;
        opacity: 1;
    }

    /* cursor halo removed (mouse-responsive effects disabled) */

    /* grain texture removed */

    .scroll-light {
        position: fixed;
        left: 0;
        top: 0;
        width: 100%;
        height: 120vh;
        pointer-events: none;
        z-index: 9997;
        opacity: 0;
        transition: opacity 420ms linear, transform 420ms linear;
        transform: translateY(0);
        background: radial-gradient(60% 40% at 50% 8%, rgba(255,255,255,0.14), rgba(255,255,255,0.06) 25%, transparent 45%);
        mix-blend-mode: overlay;
    }

    html.dark .scroll-light {
        background: radial-gradient(60% 40% at 50% 8%, rgba(255,255,255,0.06), rgba(255,255,255,0.03) 25%, transparent 45%);
        mix-blend-mode: screen;
    }

    #menu-label,
    .masthead .menu a {
        cursor: pointer;
    }
</style>
<link rel="stylesheet" href="/css/custom.css" />
<script>
    (function () {
        const root = document.documentElement;
        const savedTheme = localStorage.getItem("theme");
        if (savedTheme === "dark" || savedTheme === "light") {
            root.classList.remove("dark", "light");
            root.classList.add(savedTheme);
        }

        function normalizePathForCompare(pathname) {
            if (pathname.length > 1 && pathname.endsWith("/")) {
                return pathname.slice(0, -1);
            }
            return pathname;
        }

        function syncMenuActiveState(pathname) {
            const target = normalizePathForCompare(pathname);
            document.querySelectorAll(".masthead .menu li").forEach(function (li) {
                li.classList.remove("active");
                const a = li.querySelector("a[href]");
                if (!a) return;
                let linkPath;
                try {
                    linkPath = normalizePathForCompare(
                        new URL(a.getAttribute("href"), window.location.origin).pathname,
                    );
                } catch (_) {
                    return;
                }
                if (linkPath === target) li.classList.add("active");
            });
        }

        function activateScriptsIn(container) {
            container.querySelectorAll("script").forEach(function (oldScript) {
                const s = document.createElement("script");
                for (let i = 0; i < oldScript.attributes.length; i++) {
                    const attr = oldScript.attributes[i];
                    s.setAttribute(attr.name, attr.value);
                }
                s.textContent = oldScript.textContent;
                oldScript.parentNode.replaceChild(s, oldScript);
            });
        }

        function enhanceCodeBlockCopyButtons() {
            document.querySelectorAll(".highlight").forEach(function (codeBlock) {
                if (codeBlock.querySelector(".copy-button")) return;
                const copyButton = document.createElement("button");
                copyButton.className = "copy-button";
                copyButton.textContent = "Copy";
                copyButton.setAttribute("type", "button");
                codeBlock.appendChild(copyButton);
                copyButton.addEventListener("click", function () {
                    const codeElement = codeBlock.querySelector("code");
                    const codeText = codeElement ? codeElement.innerText : codeBlock.innerText.replace(/\b(Copy|Copied!)\b/g, "").trim();
                    navigator.clipboard.writeText(codeText).then(function () {
                        copyButton.classList.add("copied");
                        copyButton.textContent = "Copied!";
                        setTimeout(function () {
                            copyButton.textContent = "Copy";
                            copyButton.classList.remove("copied");
                        }, 2000);
                    });
                });
            });
        }

        function applySoftNavigation(fetchedDoc, displayUrl) {
            const nextMain = fetchedDoc.querySelector("article.main");
            const currentMain = document.querySelector("article.main");
            if (!nextMain || !currentMain) return false;

            const nextBody = fetchedDoc.body;
            if (nextBody) document.body.className = nextBody.className;
            if (fetchedDoc.title) document.title = fetchedDoc.title;

            currentMain.innerHTML = nextMain.innerHTML;
            activateScriptsIn(currentMain);
            enhanceCodeBlockCopyButtons();

            try {
                const u = new URL(displayUrl, window.location.href);
                syncMenuActiveState(u.pathname);
            } catch (_) {
                syncMenuActiveState(window.location.pathname);
            }

            window.scrollTo(0, 0);
            requestAnimationFrame(function () {
                const ae = document.activeElement;
                if (ae && ae.closest && ae.closest(".masthead")) ae.blur();
            });

            window.dispatchEvent(new CustomEvent("site:softnav", { detail: { url: displayUrl } }));
            return true;
        }

        function shouldSoftNavigate(anchor, event) {
            if (!anchor || anchor.tagName !== "A") return false;
            if (event.defaultPrevented) return false;
            if (event.button !== 0) return false;
            if (event.metaKey || event.ctrlKey || event.shiftKey || event.altKey) return false;
            const targetAttr = anchor.getAttribute("target");
            if (targetAttr && targetAttr !== "_self") return false;
            if (anchor.hasAttribute("download")) return false;
            const rawHref = anchor.getAttribute("href");
            if (!rawHref || rawHref.startsWith("#") || rawHref.startsWith("javascript:") || rawHref.startsWith("mailto:") || rawHref.startsWith("tel:") || rawHref.startsWith("data:")) return false;
            let dest;
            try { dest = new URL(anchor.href); } catch (_) { return false; }
            if (dest.origin !== window.location.origin) return false;
            const here = new URL(window.location.href);
            const hereLang = (here.pathname.split('/').filter(Boolean)[0] || '');
            const destLang = (dest.pathname.split('/').filter(Boolean)[0] || '');
            if (hereLang !== destLang) return false;
            if (dest.pathname === here.pathname && dest.search === here.search && dest.hash !== here.hash) return false;
            if (dest.pathname === here.pathname && dest.search === here.search && dest.hash === here.hash) return false;
            return dest;
        }

        document.addEventListener("DOMContentLoaded", function () {
            document.addEventListener("click", function (event) {
                const anchor = event.target && event.target.closest ? event.target.closest("a[href]") : null;
                const dest = shouldSoftNavigate(anchor, event);
                if (!dest) return;
                const fetchUrl = dest.pathname + dest.search;
                event.preventDefault();
                fetch(fetchUrl, { credentials: "same-origin", headers: { Accept: "text/html" } })
                    .then(function (response) { if (!response.ok) throw new Error("fetch failed"); return response.text(); })
                    .then(function (html) {
                        const parser = new DOMParser();
                        const fetchedDoc = parser.parseFromString(html, "text/html");
                        if (!applySoftNavigation(fetchedDoc, dest.href)) { window.location.assign(dest.href); return; }
                        window.history.pushState({ softNav: true, url: dest.href }, "", dest.pathname + dest.search + dest.hash);
                    })
                    .catch(function () { window.location.assign(dest.href); });
            }, true);

            window.addEventListener("popstate", function () {
                const url = window.location.pathname + window.location.search;
                fetch(url, { credentials: "same-origin", headers: { Accept: "text/html" } })
                    .then(function (response) { if (!response.ok) throw new Error("fetch failed"); return response.text(); })
                    .then(function (html) {
                        const parser = new DOMParser();
                        const fetchedDoc = parser.parseFromString(html, "text/html");
                        if (!applySoftNavigation(fetchedDoc, window.location.href)) window.location.reload();
                    })
                    .catch(function () { window.location.reload(); });
            });

            const themeToggle = document.getElementById("theme-toggle");
            if (themeToggle) {
                themeToggle.addEventListener("click", function () {
                    if (root.classList.contains("dark")) {
                        root.classList.remove("dark");
                        root.classList.add("light");
                        localStorage.setItem("theme", "light");
                    } else {
                        root.classList.remove("light");
                        root.classList.add("dark");
                        localStorage.setItem("theme", "dark");
                    }
                });
            }

            // Back to top button
            const backToTopBtn = document.createElement("button");
            backToTopBtn.id = "back-to-top";
            backToTopBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M7 14l5-5 5 5z"/></svg>';
            backToTopBtn.setAttribute("aria-label", "Back to top");
            document.body.appendChild(backToTopBtn);
            function updateBackToTopButton() { backToTopBtn.style.display = window.scrollY > 300 ? "flex" : "none"; }
            window.addEventListener("scroll", updateBackToTopButton); updateBackToTopButton();
            backToTopBtn.addEventListener("click", function () { window.scrollTo({ top: 0, behavior: "smooth" }); });

            enhanceCodeBlockCopyButtons();

            // social links hover-disable behavior
            const socialLinkEls = document.querySelectorAll(".social-links a");
            socialLinkEls.forEach(function (link) {
                link.addEventListener("click", function () {
                    link.blur();
                    socialLinkEls.forEach(function (l) { l.classList.add("hover-disabled"); });
                });
            });
            document.addEventListener("pointermove", function () { socialLinkEls.forEach(function (l) { l.classList.remove("hover-disabled"); }); }, { passive: true });

            // Close menu when a link is clicked
            const menuCheck = document.getElementById("menu-check");
            const menuLinks = document.querySelectorAll(".masthead .menu a");
            menuLinks.forEach((link) => link.addEventListener("click", function () { if (menuCheck) menuCheck.checked = false; }));

            // Ambient: scroll-based light effect only (no mouse-responsive effects)
            const motionQuery = window.matchMedia("(prefers-reduced-motion: reduce)");
            const smallScreenQuery = window.matchMedia("(max-width: 760px)");
            const shouldSkipAmbient = motionQuery.matches || smallScreenQuery.matches;

            let scrollLight = null;
            if (!shouldSkipAmbient) {
                if (!document.querySelector('.scroll-light')) {
                    scrollLight = document.createElement('div');
                    scrollLight.className = 'scroll-light';
                    scrollLight.setAttribute('aria-hidden', 'true');
                    document.body.appendChild(scrollLight);
                } else {
                    scrollLight = document.querySelector('.scroll-light');
                }

                let scrollRaf = null;
                function updateScrollLight() {
                    if (!scrollLight) return;
                    const max = Math.max(1, document.documentElement.scrollHeight - window.innerHeight);
                    const prog = Math.max(0, Math.min(1, window.scrollY / max));
                    const opacity = Math.min(0.35, prog * 0.6);
                    const ty = -prog * 12;
                    scrollLight.style.opacity = String(opacity);
                    scrollLight.style.transform = `translateY(${ty}vh)`;
                }
                function onScroll() { if (scrollRaf) return; scrollRaf = window.requestAnimationFrame(function () { updateScrollLight(); scrollRaf = null; }); }
                window.addEventListener('scroll', onScroll, { passive: true }); updateScrollLight();

                function removeAmbient() { window.removeEventListener('scroll', onScroll); const s = document.querySelector('.scroll-light'); if (s) s.remove(); }
                function mediaListener(e) { if (e.matches) removeAmbient(); }
                if (motionQuery.addEventListener) motionQuery.addEventListener('change', mediaListener); else motionQuery.addListener(mediaListener);
                if (smallScreenQuery.addEventListener) smallScreenQuery.addEventListener('change', mediaListener); else smallScreenQuery.addListener(mediaListener);
            }
        });
    })();
</script>
