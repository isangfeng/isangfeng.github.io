<style>
    .social-links {
        display: flex;
        justify-content: flex-end;
        gap: 0.9rem;
        margin-top: 1.2rem;
    }

    .social-links a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 2.2rem;
        height: 2.2rem;
        border: 1px solid currentColor;
        border-radius: 999px;
        padding: 0;
        transition:
            background-color 0.18s ease,
            color 0.18s ease;
    }

    .social-links a:hover:not(.hover-disabled) {
        background: #111;
        color: #fff;
    }

    .social-links svg {
        width: 1.1rem;
        height: 1.1rem;
        fill: currentColor;
    }

    @media (max-width: 760px) {
        .social-links {
            justify-content: center;
        }
    }

    .theme-toggle {
        display: flex;
        justify-content: flex-end;
        width: 100%;
        margin-top: 1rem;
        z-index: 1;
    }

    .theme-toggle-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 3.2rem;
        min-width: 3.2rem;
        min-height: 1.7rem;
        padding: 0 0.3rem;
        border: 1px solid currentColor;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.95);
        color: #111;
        cursor: pointer;
        transition:
            background-color 0.18s ease,
            color 0.18s ease;
        position: relative;
        visibility: visible !important;
        opacity: 1 !important;
        pointer-events: auto !important;
        box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.08);
    }

    @media (hover: hover) {
        .theme-toggle-btn:hover {
            background: rgba(0, 0, 0, 0.08);
            color: #111;
        }
    }

    .theme-toggle-btn:focus-visible {
        outline: 2px solid rgba(0, 0, 0, 0.2);
        outline-offset: 2px;
    }

    .theme-toggle-btn:active {
        background: rgba(255, 255, 255, 0.95) !important;
        color: #111 !important;
    }

    html.dark .theme-toggle-btn:active {
        background: #121212 !important;
        color: #e0e0e0 !important;
    }

    html.light .theme-toggle-btn svg {
        display: block;
        width: 1rem;
        height: 1rem;
        fill: currentColor;
        transition: opacity 0.3s ease;
    }

    .theme-toggle-btn .sun-icon {
        opacity: 1;
        position: relative;
    }

    .theme-toggle-btn .moon-icon {
        opacity: 0;
        position: relative;
    }

    html.dark .theme-toggle-btn .sun-icon {
        opacity: 0;
    }

    html.dark .theme-toggle-btn .moon-icon {
        opacity: 1;
        fill: #ffffff;
    }

    html.dark .theme-toggle-btn {
        background: transparent;
        border-color: #ffffff;
        color: #ffffff;
    }

    @media (hover: hover) {
        html.dark .theme-toggle-btn:hover {
            background: #ffffff;
            color: #121212;
            border-color: #121212;
        }

        html.dark .theme-toggle-btn:hover .moon-icon {
            fill: #121212;
        }
    }

    @media (prefers-color-scheme: dark) {
        html:not(.light) .theme-toggle-btn {
            background: transparent;
            border-color: #ffffff;
            color: #ffffff;
        }

        html:not(.light) .theme-toggle-btn .moon-icon {
            fill: #ffffff;
        }
    }

    @media (prefers-color-scheme: dark) and (hover: hover) {
        html:not(.light) .theme-toggle-btn:hover {
            background: #ffffff;
            color: #121212;
            border-color: #121212;
        }

        html:not(.light) .theme-toggle-btn:hover .moon-icon {
            fill: #121212;
        }
    }

    @media (max-width: 760px) {
        .theme-toggle {
            justify-content: center;
        }
    }

    #ambient-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100% !important;
        height: 100% !important;
        pointer-events: none;
        z-index: 0;
    }

    #menu-label,
    .masthead .menu a {
        cursor: pointer;
    }
</style>
<link rel="stylesheet" href="/css/custom.css" />
<script>
    (function () {
        const root = document.documentElement;
        const savedTheme = localStorage.getItem("theme");
        if (savedTheme === "dark" || savedTheme === "light") {
            root.classList.remove("dark", "light");
            root.classList.add(savedTheme);
        }

        function normalizePathForCompare(pathname) {
            if (pathname.length > 1 && pathname.endsWith("/")) {
                return pathname.slice(0, -1);
            }
            return pathname;
        }

        function syncMenuActiveState(pathname) {
            const target = normalizePathForCompare(pathname);
            document.querySelectorAll(".masthead .menu li").forEach(function (li) {
                li.classList.remove("active");
                const a = li.querySelector("a[href]");
                if (!a) {
                    return;
                }
                let linkPath;
                try {
                    linkPath = normalizePathForCompare(
                        new URL(a.getAttribute("href"), window.location.origin)
                            .pathname,
                    );
                } catch (_) {
                    return;
                }
                if (linkPath === target) {
                    li.classList.add("active");
                }
            });
        }

        function activateScriptsIn(container) {
            container.querySelectorAll("script").forEach(function (oldScript) {
                const s = document.createElement("script");
                for (let i = 0; i < oldScript.attributes.length; i++) {
                    const attr = oldScript.attributes[i];
                    s.setAttribute(attr.name, attr.value);
                }
                s.textContent = oldScript.textContent;
                oldScript.parentNode.replaceChild(s, oldScript);
            });
        }

        function enhanceCodeBlockCopyButtons() {
            document.querySelectorAll(".highlight").forEach(function (codeBlock) {
                if (codeBlock.querySelector(".copy-button")) {
                    return;
                }

                const copyButton = document.createElement("button");
                copyButton.className = "copy-button";
                copyButton.textContent = "Copy";
                copyButton.setAttribute("type", "button");
                codeBlock.appendChild(copyButton);

                copyButton.addEventListener("click", function () {
                    const codeElement = codeBlock.querySelector("code");
                    const codeText = codeElement
                        ? codeElement.innerText
                        : codeBlock.innerText
                              .replace(/\b(Copy|Copied!)\b/g, "")
                              .trim();
                    navigator.clipboard.writeText(codeText).then(function () {
                        copyButton.classList.add("copied");
                        copyButton.textContent = "Copied!";
                        setTimeout(function () {
                            copyButton.textContent = "Copy";
                            copyButton.classList.remove("copied");
                        }, 2000);
                    });
                });
            });
        }

        function applySoftNavigation(fetchedDoc, displayUrl) {
            const nextMain = fetchedDoc.querySelector("article.main");
            const currentMain = document.querySelector("article.main");
            if (!nextMain || !currentMain) {
                return false;
            }

            const nextBody = fetchedDoc.body;
            if (nextBody) {
                document.body.className = nextBody.className;
            }

            if (fetchedDoc.title) {
                document.title = fetchedDoc.title;
            }

            currentMain.innerHTML = nextMain.innerHTML;
            activateScriptsIn(currentMain);
            enhanceCodeBlockCopyButtons();

            try {
                const u = new URL(displayUrl, window.location.href);
                syncMenuActiveState(u.pathname);
            } catch (_) {
                syncMenuActiveState(window.location.pathname);
            }

            window.scrollTo(0, 0);

            requestAnimationFrame(function () {
                const ae = document.activeElement;
                if (ae && ae.closest && ae.closest(".masthead")) {
                    ae.blur();
                }
            });

            window.dispatchEvent(
                new CustomEvent("site:softnav", {
                    detail: { url: displayUrl },
                }),
            );

            return true;
        }

        function shouldSoftNavigate(anchor, event) {
            if (!anchor || anchor.tagName !== "A") {
                return false;
            }
            if (event.defaultPrevented) {
                return false;
            }
            if (event.button !== 0) {
                return false;
            }
            if (event.metaKey || event.ctrlKey || event.shiftKey || event.altKey) {
                return false;
            }
            const targetAttr = anchor.getAttribute("target");
            if (targetAttr && targetAttr !== "_self") {
                return false;
            }
            if (anchor.hasAttribute("download")) {
                return false;
            }
            const rawHref = anchor.getAttribute("href");
            if (
                !rawHref ||
                rawHref.startsWith("#") ||
                rawHref.startsWith("javascript:") ||
                rawHref.startsWith("mailto:") ||
                rawHref.startsWith("tel:") ||
                rawHref.startsWith("data:")
            ) {
                return false;
            }
            let dest;
            try {
                dest = new URL(anchor.href);
            } catch (_) {
                return false;
            }
            if (dest.origin !== window.location.origin) {
                return false;
            }
            const here = new URL(window.location.href);
            if (
                dest.pathname === here.pathname &&
                dest.search === here.search &&
                dest.hash !== here.hash
            ) {
                return false;
            }
            if (dest.pathname === here.pathname && dest.search === here.search && dest.hash === here.hash) {
                return false;
            }
            return dest;
        }

        document.addEventListener("DOMContentLoaded", function () {
            document.addEventListener(
                "click",
                function (event) {
                    const anchor = event.target && event.target.closest
                        ? event.target.closest("a[href]")
                        : null;
                    const dest = shouldSoftNavigate(anchor, event);
                    if (!dest) {
                        return;
                    }

                    const fetchUrl = dest.pathname + dest.search;
                    event.preventDefault();

                    fetch(fetchUrl, {
                        credentials: "same-origin",
                        headers: { Accept: "text/html" },
                    })
                        .then(function (response) {
                            if (!response.ok) {
                                throw new Error("fetch failed");
                            }
                            return response.text();
                        })
                        .then(function (html) {
                            const parser = new DOMParser();
                            const fetchedDoc = parser.parseFromString(
                                html,
                                "text/html",
                            );
                            if (!applySoftNavigation(fetchedDoc, dest.href)) {
                                window.location.assign(dest.href);
                                return;
                            }
                            window.history.pushState(
                                { softNav: true, url: dest.href },
                                "",
                                dest.pathname + dest.search + dest.hash,
                            );
                        })
                        .catch(function () {
                            window.location.assign(dest.href);
                        });
                },
                true,
            );

            window.addEventListener("popstate", function () {
                const url = window.location.pathname + window.location.search;
                fetch(url, {
                    credentials: "same-origin",
                    headers: { Accept: "text/html" },
                })
                    .then(function (response) {
                        if (!response.ok) {
                            throw new Error("fetch failed");
                        }
                        return response.text();
                    })
                    .then(function (html) {
                        const parser = new DOMParser();
                        const fetchedDoc = parser.parseFromString(html, "text/html");
                        if (!applySoftNavigation(fetchedDoc, window.location.href)) {
                            window.location.reload();
                        }
                    })
                    .catch(function () {
                        window.location.reload();
                    });
            });

            const themeToggle = document.getElementById("theme-toggle");
            if (themeToggle) {
                themeToggle.addEventListener("click", function () {
                    if (root.classList.contains("dark")) {
                        root.classList.remove("dark");
                        root.classList.add("light");
                        localStorage.setItem("theme", "light");
                    } else {
                        root.classList.remove("light");
                        root.classList.add("dark");
                        localStorage.setItem("theme", "dark");
                    }
                });
            }

            // Back to top button
            const backToTopBtn = document.createElement("button");
            backToTopBtn.id = "back-to-top";
            backToTopBtn.innerHTML =
                '<svg viewBox="0 0 24 24"><path d="M7 14l5-5 5 5z"/></svg>';
            backToTopBtn.setAttribute("aria-label", "Back to top");
            document.body.appendChild(backToTopBtn);

            function updateBackToTopButton() {
                if (window.scrollY > 300) {
                    backToTopBtn.style.display = "flex";
                } else {
                    backToTopBtn.style.display = "none";
                }
            }

            window.addEventListener("scroll", updateBackToTopButton);
            updateBackToTopButton();

            backToTopBtn.addEventListener("click", function () {
                window.scrollTo({ top: 0, behavior: "smooth" });
            });

            enhanceCodeBlockCopyButtons();

            // Disable hover style after clicking social links so that the
            // stuck CSS :hover state (which persists after opening a new
            // tab/window) does not remain visible when the user returns.
            //
            // mouseleave is intentionally NOT used to re-enable hover, because
            // it fires when the cursor moves into the browser chrome (tab bar,
            // address bar), which would strip hover-disabled before the user
            // even returns to this tab.  Instead, pointermove re-enables hover
            // only when the cursor is actually moving inside the page, at which
            // point the browser's :hover state is accurate again.
            const socialLinkEls = document.querySelectorAll(".social-links a");

            socialLinkEls.forEach(function (link) {
                link.addEventListener("click", function () {
                    link.blur();
                    socialLinkEls.forEach(function (l) {
                        l.classList.add("hover-disabled");
                    });
                });
            });

            document.addEventListener(
                "pointermove",
                function () {
                    socialLinkEls.forEach(function (l) {
                        l.classList.remove("hover-disabled");
                    });
                },
                { passive: true },
            );

            // Close menu when a link is clicked
            const menuCheck = document.getElementById("menu-check");
            const menuLinks = document.querySelectorAll(".masthead .menu a");
            menuLinks.forEach((link) => {
                link.addEventListener("click", function () {
                    if (menuCheck) {
                        menuCheck.checked = false;
                    }
                });
            });

            const motionQuery = window.matchMedia(
                "(prefers-reduced-motion: reduce)",
            );
            const smallScreenQuery = window.matchMedia("(max-width: 760px)");
            if (
                motionQuery.matches ||
                smallScreenQuery.matches ||
                document.getElementById("ambient-canvas")
            ) {
                return;
            }

            const ambientCanvas = document.createElement("canvas");
            ambientCanvas.id = "ambient-canvas";
            ambientCanvas.setAttribute("aria-hidden", "true");
            document.body.prepend(ambientCanvas);

            const context = ambientCanvas.getContext("2d");
            if (!context) {
                ambientCanvas.remove();
                return;
            }

            const pointer = {
                x: window.innerWidth / 2,
                y: window.innerHeight / 2,
                active: false,
            };
            let particles = [];
            let canvasWidth = 0;
            let canvasHeight = 0;
            let animationFrame = 0;
            let ambientStopped = false;

            function isDarkTheme() {
                return (
                    root.classList.contains("dark") ||
                    (!root.classList.contains("light") &&
                        window.matchMedia("(prefers-color-scheme: dark)")
                            .matches)
                );
            }

            function getAmbientColors() {
                if (isDarkTheme()) {
                    return {
                        point: "rgba(224, 224, 224, ",
                        streak: "rgba(224, 224, 224, ",
                    };
                }

                return {
                    point: "rgba(17, 17, 17, ",
                    streak: "rgba(17, 17, 17, ",
                };
            }

            function resizeAmbientCanvas() {
                if (ambientStopped) {
                    return;
                }

                const pixelRatio = Math.min(window.devicePixelRatio || 1, 2);
                canvasWidth = window.innerWidth;
                canvasHeight = window.innerHeight;
                ambientCanvas.width = Math.floor(canvasWidth * pixelRatio);
                ambientCanvas.height = Math.floor(canvasHeight * pixelRatio);
                ambientCanvas.style.width = canvasWidth + "px";
                ambientCanvas.style.height = canvasHeight + "px";
                context.setTransform(pixelRatio, 0, 0, pixelRatio, 0, 0);

                const particleCount = Math.min(
                    72,
                    Math.max(
                        36,
                        Math.floor((canvasWidth * canvasHeight) / 19000),
                    ),
                );
                particles = Array.from({ length: particleCount }, function () {
                    const isStreak = Math.random() > 0.62;
                    return {
                        x: Math.random() * canvasWidth,
                        y: Math.random() * canvasHeight,
                        vx: -0.06 + Math.random() * 0.12,
                        vy: isStreak
                            ? 0.36 + Math.random() * 0.46
                            : 0.08 + Math.random() * 0.18,
                        radius: 0.7 + Math.random() * 1.1,
                        length: isStreak ? 8 + Math.random() * 15 : 0,
                        opacity: isStreak
                            ? 0.08 + Math.random() * 0.09
                            : 0.14 + Math.random() * 0.16,
                        drift: Math.random() * Math.PI * 2,
                    };
                });
            }

            function animateAmbientParticles() {
                if (ambientStopped) {
                    return;
                }

                const colors = getAmbientColors();
                context.clearRect(0, 0, canvasWidth, canvasHeight);
                context.lineWidth = 1;

                particles.forEach(function (particle) {
                    particle.drift += 0.008;
                    particle.x +=
                        particle.vx + Math.sin(particle.drift) * 0.045;
                    particle.y += particle.vy;

                    if (particle.x < -20) particle.x = canvasWidth + 20;
                    if (particle.x > canvasWidth + 20) particle.x = -20;
                    if (particle.y > canvasHeight + 24) {
                        particle.y = -24;
                        particle.x = Math.random() * canvasWidth;
                    }

                    let pointerBoost = 0;
                    if (pointer.active) {
                        const pointerDistance = Math.hypot(
                            particle.x - pointer.x,
                            particle.y - pointer.y,
                        );
                        if (pointerDistance < 135) {
                            const force = (1 - pointerDistance / 135) * 0.55;
                            particle.x +=
                                (particle.x - pointer.x) * 0.006 * force;
                            particle.y +=
                                (particle.y - pointer.y) * 0.004 * force;
                            pointerBoost = force * 0.18;
                        }
                    }

                    if (particle.length > 0) {
                        context.strokeStyle =
                            colors.streak +
                            Math.min(particle.opacity + pointerBoost, 0.28) +
                            ")";
                        context.beginPath();
                        context.moveTo(particle.x, particle.y);
                        context.lineTo(
                            particle.x - particle.length * 0.18,
                            particle.y + particle.length,
                        );
                        context.stroke();
                    } else {
                        context.fillStyle =
                            colors.point +
                            Math.min(particle.opacity + pointerBoost, 0.36) +
                            ")";
                        context.beginPath();
                        context.arc(
                            particle.x,
                            particle.y,
                            particle.radius,
                            0,
                            Math.PI * 2,
                        );
                        context.fill();
                    }
                });

                animationFrame = window.requestAnimationFrame(
                    animateAmbientParticles,
                );
            }

            window.addEventListener("mousemove", function (event) {
                pointer.x = event.clientX;
                pointer.y = event.clientY;
                pointer.active = true;
            });

            window.addEventListener("mouseleave", function () {
                pointer.active = false;
            });

            window.addEventListener("resize", resizeAmbientCanvas);

            resizeAmbientCanvas();
            animationFrame = window.requestAnimationFrame(
                animateAmbientParticles,
            );

            function stopAmbientParticles() {
                ambientStopped = true;
                window.cancelAnimationFrame(animationFrame);
                window.removeEventListener("resize", resizeAmbientCanvas);
                ambientCanvas.remove();
            }

            function addMediaQueryListener(query, callback) {
                if (query.addEventListener) {
                    query.addEventListener("change", callback);
                } else if (query.addListener) {
                    query.addListener(callback);
                }
            }

            addMediaQueryListener(motionQuery, function (event) {
                if (event.matches) {
                    stopAmbientParticles();
                }
            });

            addMediaQueryListener(smallScreenQuery, function (event) {
                if (event.matches) {
                    stopAmbientParticles();
                }
            });
        });
    })();
</script>
